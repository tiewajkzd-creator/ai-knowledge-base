        let currentCategory = 'Agent系统';
        let currentFilter = 'all';
        
        function renderNav() {
            const nav = document.getElementById('nav');
            nav.innerHTML = Object.keys(data.categories).map(cat => {
                const subs = Object.keys(data.grouped[cat]);
                return `
                    <div class="nav-item ${cat === currentCategory ? 'active' : ''}" onclick="showCategory('${cat}')">
                        ${data.categories[cat]} ${cat}
                    </div>
                    ${subs.map(sub => `
                        <div class="sub-nav" onclick="showSubCategory('${cat}', '${sub}'); event.stopPropagation();">
                            └ ${sub} (${data.grouped[cat][sub].length})
                        </div>
                    `).join('')}
                `;
            }).join('');
        }
        
        function showCategory(cat) {
            currentCategory = cat;
            renderNav();
            renderArticles();
        }
        
        function showSubCategory(cat, sub) {
            currentCategory = cat;
            renderNav();
            renderArticles(sub);
        }
        
        function filterBy(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderArticles();
        }
        
        function renderArticles(subFilter = null) {
            let list = data.articles.filter(a => a.category === currentCategory);
            if (subFilter) list = list.filter(a => a.subCategory === subFilter);
            
            if (currentFilter === 'author') {
                const byAuthor = {};
                list.forEach(a => {
                    if (!byAuthor[a.author]) byAuthor[a.author] = [];
                    byAuthor[a.author].push(a);
                });
                document.getElementById('articles').innerHTML = Object.keys(byAuthor).map(author => `
                    <h3 style="margin: 20px 0 10px;">${author}</h3>
                    ${byAuthor[author].map(renderCard).join('')}
                `).join('');
            } else if (currentFilter === 'time') {
                list.sort((a, b) => new Date(b.date) - new Date(a.date));
                document.getElementById('articles').innerHTML = list.map(renderCard).join('');
            } else if (currentFilter === 'quality') {
                list.sort((a, b) => b.score.length - a.score.length);
                document.getElementById('articles').innerHTML = list.map(renderCard).join('');
            } else {
                document.getElementById('articles').innerHTML = `
                    <h2>${data.categories[currentCategory]} ${currentCategory}${subFilter ? ' / ' + subFilter : ''}</h2>
                    ${list.map(renderCard).join('')}
                `;
            }
        }
        
        function renderCard(a) {
            return `
                <div class="article-card" onclick="window.open('${encodeURI(a.path.replace('.md', ''))}')">
                    <div class="article-meta">
                        <span>${a.freshness}</span> | 
                        <span>${a.author}</span> | 
                        <span>${a.date}</span> | 
                        <span>${a.score}</span>
                    </div>
                    <h3 class="article-title">${a.title}</h3>
                </div>
            `;
        }
        
        renderNav();
        renderArticles();
