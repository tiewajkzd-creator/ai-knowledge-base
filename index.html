<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI大脑知识库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .stats { color: #666; font-size: 14px; }
        .search {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .category {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .category h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .item:last-child { border-bottom: none; }
        .item-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }
        .item-meta {
            font-size: 12px;
            color: #999;
        }
        .item-source {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 AI大脑知识库</h1>
            <div class="stats">
                总计 <span id="total">0</span> 条 | 
                今日新增 <span id="today">0</span> 条 | 
                本周新增 <span id="week">0</span> 条
            </div>
        </header>

        <div class="search">
            <input type="text" id="searchInput" placeholder="搜索知识库...">
        </div>

        <div class="categories" id="categories"></div>
    </div>

    <script>
        let allData = {};
        
        async function loadData() {
            const response = await fetch('data.json');
            allData = await response.json();
            updateStats();
            renderCategories();
        }

        function updateStats() {
            document.getElementById('total').textContent = allData.total || 0;
            document.getElementById('today').textContent = allData.today || 0;
            document.getElementById('week').textContent = allData.week || 0;
        }

        function renderCategories(filter = '') {
            const container = document.getElementById('categories');
            container.innerHTML = '';

            Object.entries(allData.categories || {}).forEach(([category, items]) => {
                const filteredItems = items.filter(item => 
                    !filter || 
                    item.title.toLowerCase().includes(filter.toLowerCase()) ||
                    item.summary?.toLowerCase().includes(filter.toLowerCase())
                );

                if (filteredItems.length === 0) return;

                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `
                    <h2>${category} (${filteredItems.length})</h2>
                    ${filteredItems.map(item => `
                        <div class="item">
                            <div class="item-title">${item.title}</div>
                            <div class="item-meta">
                                <span class="item-source">${item.source}</span>
                                ${item.date}
                                ${item.url ? `<a href="${item.url}" target="_blank">🔗</a>` : ''}
                            </div>
                            ${item.summary ? `<div style="margin-top:5px;font-size:13px;color:#666;">${item.summary}</div>` : ''}
                        </div>
                    `).join('')}
                `;
                container.appendChild(categoryDiv);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCategories(e.target.value);
        });

        loadData();
    </script>
</body>
</html>
