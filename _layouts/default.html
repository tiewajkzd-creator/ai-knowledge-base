<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: white;
            min-height: 100vh;
        }
        h1 { 
            font-size: 2em; 
            margin-bottom: 20px;
            color: #667eea;
        }
        h2 { 
            font-size: 1.5em; 
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        h3 { font-size: 1.2em; margin: 20px 0 10px; }
        p { margin: 15px 0; }
        strong { color: #667eea; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
        ul, ol { margin: 15px 0; padding-left: 30px; }
        li { margin: 8px 0; }
        code { 
            background: #f8f9fa; 
            padding: 2px 6px; 
            border-radius: 3px;
            font-family: monospace;
        }
        hr { 
            border: none; 
            border-top: 1px solid #e0e0e0; 
            margin: 30px 0; 
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>
</body>
</html>
